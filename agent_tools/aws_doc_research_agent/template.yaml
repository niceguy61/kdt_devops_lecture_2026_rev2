AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: AWS documentation research agent exposed through API Gateway HTTP API.

Parameters:
  StageName:
    Type: String
    Default: prod

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Architectures:
      - x86_64

Resources:
  AgentHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref StageName
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - content-type
          - authorization
          - x-api-key

  AwsDocResearchAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: AWS documentation research agent for lecture production.
      CodeUri: src/
      Handler: aws_doc_research_agent.lambda_handler.handler
      Events:
        InvokeApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref AgentHttpApi
            Path: /invoke
            Method: POST

  AwsDocResearchAgentLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AwsDocResearchAgentFunction}"
      RetentionInDays: 7

Outputs:
  ApiInvokeUrl:
    Description: POST endpoint for the AWS doc research agent.
    Value: !Sub "https://${AgentHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${StageName}/invoke"
  FunctionName:
    Description: Lambda function name.
    Value: !Ref AwsDocResearchAgentFunction
