name: w3d3-ci-gate-demo

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show evidence context
        run: |
          pwd
          git status --short
          git log --oneline -3

      - name: Check shell syntax
        run: |
          bash -n chmod +x week3/day3/labs/ci-gate-demo/tests/smoke_test.sh
          bash -n week3/day3/labs/ci-gate-demo/app.sh
          bash -n week3/day3/labs/ci-gate-demo/tests/smoke_test.sh

      - name: Run smoke test
        run: |
          week3/day3/labs/ci-gate-demo/tests/smoke_test.sh
