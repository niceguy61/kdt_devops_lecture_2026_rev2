apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-demo
  namespace: week4-observe
  labels:
    app: crashloop-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-demo
  template:
    metadata:
      labels:
        app: crashloop-demo
    spec:
      containers:
        - name: crash
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - echo "intentional restart for observability"; sleep 5; exit 1
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi

