apiVersion: v1
kind: Pod
metadata:
  name: token-mounted-demo
  namespace: week4-security
  labels:
    app: token-mounted-demo
    owner: platform
spec:
  serviceAccountName: token-demo
  automountServiceAccountToken: true
  containers:
    - name: shell
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi
