apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-api
  namespace: week4-security
  labels:
    app: security-api
    owner: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: security-api
  template:
    metadata:
      labels:
        app: security-api
        owner: platform
    spec:
      serviceAccountName: app-runner
      automountServiceAccountToken: false
      containers:
        - name: api
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: security-api
  namespace: week4-security
  labels:
    app: security-api
spec:
  selector:
    app: security-api
  ports:
    - name: http
      port: 80
      targetPort: http
