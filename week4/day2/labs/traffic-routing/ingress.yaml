apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: paperclip
  namespace: week4
  labels:
    app: paperclip
spec:
  ingressClassName: nginx
  rules:
    - host: paperclip.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

