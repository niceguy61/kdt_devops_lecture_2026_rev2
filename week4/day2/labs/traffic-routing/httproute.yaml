apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: paperclip-routes
  namespace: week4
spec:
  parentRefs:
    - name: paperclip-gateway
  hostnames:
    - paperclip.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: api
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
