apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mesh-msa-demo
  labels:
    app: frontend
    tier: web
    owner: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: web
        owner: platform
    spec:
      containers:
        - name: traffic-generator
          image: curlimages/curl:8.10.1
          command: ["sh", "-c"]
          args:
            - |
              while true; do
                date
                curl -s --max-time 3 http://bff:8080/api/page || true
                echo
                curl -s --max-time 3 http://bff:8080/api/order || true
                echo
                sleep 2
              done
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: mesh-msa-demo
  labels:
    app: bff
    tier: api
    owner: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bff
  template:
    metadata:
      labels:
        app: bff
        tier: api
        owner: platform
    spec:
      containers:
        - name: app
          image: python:3.12-alpine
          ports:
            - name: http
              containerPort: 8080
          command: ["sh", "-c"]
          args:
            - |
              cat >/tmp/app.py <<'PY'
              import json
              import urllib.request
              from http.server import BaseHTTPRequestHandler, HTTPServer

              def fetch(url):
                  with urllib.request.urlopen(url, timeout=2) as response:
                      return json.loads(response.read().decode())

              class Handler(BaseHTTPRequestHandler):
                  def do_GET(self):
                      if self.path == "/healthz":
                          self.reply({"service": "bff", "status": "ok"})
                          return
                      if self.path == "/api/page":
                          catalog = fetch("http://catalog:8080/catalog")
                          inventory = fetch("http://inventory:8080/inventory")
                          self.reply({"service": "bff", "page": "home", "catalog": catalog, "inventory": inventory})
                          return
                      if self.path == "/api/order":
                          order = fetch("http://order:8080/orders")
                          self.reply({"service": "bff", "order": order})
                          return
                      self.send_response(404)
                      self.end_headers()

                  def reply(self, payload):
                      body = json.dumps(payload).encode()
                      self.send_response(200)
                      self.send_header("content-type", "application/json")
                      self.send_header("content-length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)

                  def log_message(self, fmt, *args):
                      print("bff", self.address_string(), fmt % args, flush=True)

              HTTPServer(("", 8080), Handler).serve_forever()
              PY
              python /tmp/app.py
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
