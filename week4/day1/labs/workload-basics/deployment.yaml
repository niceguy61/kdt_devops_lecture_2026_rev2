apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime-api
  namespace: week4
  labels:
    app: runtime-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: runtime-api
  template:
    metadata:
      labels:
        app: runtime-api
    spec:
      containers:
        - name: api
          image: hashicorp/http-echo:1.0
          args:
            - "-listen=:8080"
            - "-text=$(RESPONSE_MESSAGE)"
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secret
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

