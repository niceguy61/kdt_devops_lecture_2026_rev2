services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "18086:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - identity-api
      - payment-api

  identity-api:
    image: node:20-alpine
    working_dir: /app
    command: ["node", "server.js"]
    volumes:
      - ./apps/identity-api:/app:ro
    environment:
      PORT: 3000

  payment-api:
    image: node:20-alpine
    working_dir: /app
    command: ["node", "server.js"]
    volumes:
      - ./apps/payment-api:/app:ro
    environment:
      PORT: 3000

  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data

  db-checker:
    image: postgres:16
    depends_on:
      - db
    command:
      - sh
      - -c
      - |
        until pg_isready -h db -U postgres -d app; do sleep 1; done
        psql postgresql://postgres:postgres@db:5432/app -c "CREATE TABLE IF NOT EXISTS admin_checks(id serial PRIMARY KEY, note text, checked_at timestamptz DEFAULT now());"
        psql postgresql://postgres:postgres@db:5432/app -c "INSERT INTO admin_checks(note) VALUES ('admin template db ready');"
        psql postgresql://postgres:postgres@db:5432/app -c "SELECT id, note FROM admin_checks ORDER BY id DESC LIMIT 3;"
        tail -f /dev/null

  adminer:
    image: adminer:4
    ports:
      - "18087:8080"
    depends_on:
      - db

volumes:
  pgdata:
