services:
  frontend:
    image: nginx:1.27-alpine
    ports:
      - "18085:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
    depends_on:
      - catalog-api

  catalog-api:
    image: postgrest/postgrest:v12.2.8
    ports:
      - "18101:3000"
    environment:
      PGRST_DB_URI: postgres://app_user:app_password@db:5432/app
      PGRST_DB_SCHEMAS: api
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:18101
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - pgdata:/var/lib/postgresql/data

  db-checker:
    image: postgres:16
    depends_on:
      - db
    command:
      - sh
      - -c
      - |
        until pg_isready -h db -U postgres -d app; do sleep 1; done
        psql postgresql://postgres:postgres@db:5432/app -c "SELECT id, name, stock FROM api.products ORDER BY id;"
        tail -f /dev/null

volumes:
  pgdata:
