<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Week 2 Day 2 Docker Build Lab</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Cloud Native Week 2</p>
        <h1>Dockerfile로 만든 표준 실습 앱</h1>
        <p>
          이 정적 사이트는 Docker image build, container run, HTTP check,
          log 확인, cleanup을 연습하기 위한 Day 2 표준 실습 앱이다.
        </p>
      </section>
      <section class="grid" aria-label="Docker 확인 카드">
        <article>
          <h2>Image</h2>
          <p>소스 파일과 nginx 실행 환경을 하나의 실행 패키지로 만든다.</p>
        </article>
        <article>
          <h2>Container</h2>
          <p>image에서 시작된 실행 중인 nginx process를 확인한다.</p>
        </article>
        <article>
          <h2>확인</h2>
          <p>curl, logs, ps 출력에서 정상 상태를 확인한다.</p>
        </article>
      </section>
    </main>
