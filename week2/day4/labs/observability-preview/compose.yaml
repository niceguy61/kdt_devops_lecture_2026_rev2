services:
  sample-web:
    image: nginx:1.27-alpine
    ports:
      - "18085:80"
    networks:
      - observe-net

  log-generator:
    image: busybox:1.36
    command:
      - sh
      - -c
      - |
        while true; do
          echo "level=info service=log-generator event=heartbeat ts=$$(date -Iseconds)"
          sleep 5
        done
    networks:
      - observe-net

  load-generator:
    image: busybox:1.36
    command:
      - sh
      - -c
      - |
        while true; do
          wget -q -O- http://sample-web >/dev/null || true
          sleep 1
        done
    depends_on:
      - sample-web
    networks:
      - observe-net

  cpu-spike:
    image: busybox:1.36
    profiles: ["load"]
    command:
      - sh
      - -c
      - |
        echo "cpu spike started"
        while true; do
          true
        done
    networks:
      - observe-net

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - cadvisor
    networks:
      - observe-net

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "13000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: practice-only
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - observe-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    ports:
      - "18086:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - ${DOCKER_ROOT_DIR:-/var/lib/docker}:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - observe-net

  loki:
    image: grafana/loki:3.2.1
    command:
      - -config.file=/etc/loki/local-config.yaml
    ports:
      - "13100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - observe-net

  promtail:
    image: grafana/promtail:3.2.1
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - ${DOCKER_ROOT_DIR:-/var/lib/docker}/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - observe-net

networks:
  observe-net:

volumes:
  grafana-data:
  loki-data:
