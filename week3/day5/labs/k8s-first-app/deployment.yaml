apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-web
  namespace: week3
  labels:
    app: hello-web
    tier: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-web
  template:
    metadata:
      labels:
        app: hello-web
        tier: web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - name: http
              containerPort: 80
