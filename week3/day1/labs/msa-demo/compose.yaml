services:
  frontend:
    image: nginx:1.27-alpine
    ports:
      - "18083:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started
    networks:
      - msa-net

  api:
    build: ./api
    environment:
      SERVICE_NAME: api
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      REQUEST_ID_HEADER: x-request-id
    expose:
      - "8080"
    ports:
      - "18084:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - msa-net

  worker:
    build: ./worker
    environment:
      API_URL: http://api:8080/api/status
      WORKER_INTERVAL_SECONDS: 8
    depends_on:
      api:
        condition: service_started
    networks:
      - msa-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: paperclip
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paperclip-local-only}
    volumes:
      - msa-db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - msa-net

networks:
  msa-net:

volumes:
  msa-db-data:
